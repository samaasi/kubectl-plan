# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/kubectl-plan
    binary: kubectl-plan
    ldflags:
      - -s -w -X github.com/samaasi/kubectl-plan/pkg/version.Version={{.Version}}

archives:
  - formats:
    - tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
        - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

krews:
  - name: plan
    skip_upload: true
    short_description: "Operational decision support for Kubernetes operations"
    description: "Builds a dependency graph and calculates the risk score and blast radius before you scale, restart, or delete a resource."
    homepage: "https://github.com/samaasi/kubectl-plan"
    caveats: |
      Requires read-only RBAC permissions. Run `kubectl apply -f https://raw.githubusercontent.com/samaasi/kubectl-plan/master/deploy/rbac/clusterrole.yaml` to configure.

