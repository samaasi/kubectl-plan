# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/kubectl-plan
    binary: kubectl-plan
    ldflags:
      - -s -w -X github.com/samaasi/kubectl-plan/pkg/version.Version={{.Version}}

archives:
  - formats:
    - tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
        - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
