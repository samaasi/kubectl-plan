apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: plan
spec:
  version: "v0.1.3"
  homepage: https://github.com/samaasi/kubectl-plan
  shortDescription: "Pre-flight risk analysis for Kubernetes operations"
  description: |
    kubectl-plan builds a live dependency graph of a target resource and
    calculates a risk score and blast radius before you scale, restart,
    or delete it. Operates entirely read-only against the Kubernetes API.
  caveats: |
    Requires read-only RBAC permissions.
    Run: kubectl apply -f https://raw.githubusercontent.com/samaasi/kubectl-plan/master/deploy/rbac/clusterrole.yaml
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/samaasi/kubectl-plan/releases/download/v0.1.3/kubectl-plan_linux_amd64.tar.gz
    sha256: 0b50872543096938a53b5ff81b4a9e88906515d23014eab2d966d12c2bd96f84
    files:
    - from: kubectl-plan
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-plan

  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/samaasi/kubectl-plan/releases/download/v0.1.3/kubectl-plan_linux_arm64.tar.gz
    sha256: e26b32e8eab48d9a1849cdf6c30997e8e184738cb39d0c4476288e6eab3c0729
    files:
    - from: kubectl-plan
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-plan

  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/samaasi/kubectl-plan/releases/download/v0.1.3/kubectl-plan_darwin_amd64.tar.gz
    sha256: 6f008e7e681f4117ffc1dfcc1140fc94954ce980a87d5a5d6c9414fe19960418
    files:
    - from: kubectl-plan
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-plan

  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/samaasi/kubectl-plan/releases/download/v0.1.3/kubectl-plan_darwin_arm64.tar.gz
    sha256: ee2e74ea87b23fbf5c49234f8a1181f24dcda8b50afd3f1790d1a77ec64a628a
    files:
    - from: kubectl-plan
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-plan

  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/samaasi/kubectl-plan/releases/download/v0.1.3/kubectl-plan_windows_amd64.zip
    sha256: acada814b7dad02ea7e792fcf2180fbd1a558d049ed164e596b4316279876243
    files:
    - from: kubectl-plan.exe
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-plan.exe

  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/samaasi/kubectl-plan/releases/download/v0.1.3/kubectl-plan_windows_arm64.zip
    sha256: 297beaa704293bace382bdf8c41eba6bb902790c648c8e3a225401d9be2fc827
    files:
    - from: kubectl-plan.exe
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-plan.exe
