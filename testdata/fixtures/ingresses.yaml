apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-ingress
  namespace: production
  labels:
    app: payment-api
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /api/pay
            pathType: Prefix
            backend:
              service:
                name: payment-api-svc
                port:
                  number: 8080
          - path: /api/checkout
            pathType: Prefix
            backend:
              service:
                name: checkout-svc
                port:
                  number: 8080
